# Kenya configuration
country_name: Kenya
iso3: KEN
year: 2019

# Data paths
osm_pbf: data/raw/kenya-latest.osm.pbf
gadm_gpkg: data/raw/gadm41_KEN.gpkg
gadm_layer: ADM_ADM_2
worldpop_url: https://data.worldpop.org/GIS/Population/Global_2000_2020/2019/KEN/ken_ppp_2019.tif
worldpop_path: data/raw/ken_ppp_2019.tif

# Spatial
utm_epsg: 32637  # UTM zone 37N (Kenya straddles equator)

# Output paths
roads_gpkg: data/processed/kenya_roads.gpkg
admin_gpkg: data/processed/kenya_admin2.gpkg
trade_costs_baseline: data/processed/kenya_trade_costs_baseline.npy
trade_costs_counterfactual: data/processed/kenya_trade_costs_counterfactual.npy
admin_names: data/processed/kenya_admin2_names.npy
calibrated_gpkg: data/processed/kenya_calibrated.gpkg
trade_shares: data/processed/kenya_baseline_trade_shares.npy
model_params: data/processed/kenya_model_params.json
counterfactual_gpkg: data/processed/kenya_counterfactual.gpkg
counterfactual_results: data/processed/kenya_counterfactual_results.json

# National GDP (current USD, 2019) — fallback if WDI API is down
national_gdp_fallback: 95503089261

# Model parameters
parameters:
  theta: 5.0
  kappa: 2.0
  alpha: 0.65
  sigma: 5.0

# Cost multipliers
cost_paved: 1.0
cost_unpaved: 3.0
cost_unknown: 2.0
