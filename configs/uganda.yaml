# Spatial
utm_epsg: 32636  # UTM zone 36N

# Output paths
roads_gpkg: data/processed/uganda_roads.gpkg
admin_gpkg: data/processed/uganda_admin2.gpkg
trade_costs_baseline: data/processed/uganda_trade_costs_baseline.npy
trade_costs_counterfactual: data/processed/uganda_trade_costs_counterfactual.npy
