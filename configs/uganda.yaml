calibrated_gpkg: data/processed/uganda_calibrated.gpkg
trade_shares: data/processed/uganda_baseline_trade_shares.npy
model_params: data/processed/uganda_model_params.json
counterfactual_gpkg: data/processed/uganda_counterfactual.gpkg
