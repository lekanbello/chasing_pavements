# National GDP (current USD, 2019)
national_gdp_fallback: 35165156842

# Model parameters
parameters:
  theta: 5.0
  kappa: 2.0
  alpha: 0.65
  sigma: 5.0

# Cost multipliers
cost_paved: 1.0
cost_unpaved: 3.0
cost_unknown: 2.0
