# Uganda configuration
country_name: Uganda
iso3: UGA
year: 2019

# Data paths
osm_pbf: data/raw/uganda-latest.osm.pbf
gadm_gpkg: data/raw/gadm41_UGA.gpkg
gadm_layer: ADM_ADM_2
worldpop_url: https://data.worldpop.org/GIS/Population/Global_2000_2020/2019/UGA/uga_ppp_2019.tif
